<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Primary favicon and site icons -->
    <link rel="icon" type="image/png" href="/unhimas-logo.png" />
    <link rel="apple-touch-icon" href="/unhimas-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNHIMAS School Management System Login Page</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Optional runtime config: if /config.json exists with { "API_BASE": "https://..." }, it will set window.__API_BASE__ before the app loads. -->
    <script>
      (function(){
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/config.json', true);
          xhr.onreadystatechange = function(){
            if (xhr.readyState === 4) {
              if (xhr.status === 200) {
                try { var cfg = JSON.parse(xhr.responseText)||{}; if (cfg.API_BASE) { window.__API_BASE__ = cfg.API_BASE; } } catch(e){}
              }
            }
          };
          xhr.send();
        } catch(e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
