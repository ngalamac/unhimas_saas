# Render manifest for unhimas_saas
# Defines a static site for the frontend and a web service for the backend (Docker)
services:
  - type: web
    name: unhimas-backend
    env: docker
    root: backend
    plan: free
    envVars:
      - key: MONGO_URI
        value: ${MONGO_URI}
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    region: oregon
    autoDeploy: true
