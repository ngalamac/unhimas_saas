# Render manifest for unhimas_saas
# Defines a static site for the frontend and a web service for the backend (Docker)
services:
  - type: web
    name: unhimas-backend
    runtime: docker
    rootDir: "backend"
    plan: free # ✅ allowed for backend
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: FRONTEND_ORIGIN
        value: "https://${unhimas-frontend_HOST}"
    healthCheckPath: "/api/health"
    region: oregon
    autoDeployTrigger: commit

  - type: web
    name: unhimas-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://${unhimas-backend_HOST}"
