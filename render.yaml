# Render manifest for unhimas_saas
# Defines a Docker web service for the backend and a static site for the frontend

services:
  - type: web
    name: unhimas-backend
    runtime: docker
    rootDir: "backend"
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false # provided in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: FRONTEND_ORIGIN
        value: "https://${unhimas-frontend_HOST}" # ✅ will expand to live frontend URL
    healthCheckPath: "/api/health"
    region: oregon
    autoDeployTrigger: commit

  - type: web
    name: unhimas-frontend
    runtime: static
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://${unhimas-backend_HOST}" # ✅ baked at build time
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://unhimas-saas-wp25.onrender.com"


