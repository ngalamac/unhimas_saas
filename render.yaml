services:
  - type: web
    name: unhimas-backend
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: "https://unhimas-frontend-spxg.onrender.com"
      - key: APP_BASE_URL
        value: "https://unhimas-frontend-spxg.onrender.com"

  - type: web
    name: unhimas-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://unhimas-backend-spxg.onrender.com"
      - key: VITE_BACKEND_URL
        value: "https://unhimas-backend-spxg.onrender.com"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
