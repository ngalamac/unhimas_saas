# Render manifest for unhimas_saas
# Defines a static site for the frontend and a web service for the backend (Docker)
services:
  - type: web
    name: unhimas-backend
    env: docker
    root: "backend"
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: unhimas-frontend
          property: url
    healthCheckPath: "/api/health"
    region: oregon
    autoDeploy: true

  - type: web
    name: unhimas-frontend
    runtime: static
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: unhimas-backend
          property: url


# Render will build the Dockerfile located at `backend/Dockerfile` for the backend service.
