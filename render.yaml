# Render manifest for unhimas_saas
# Defines a static site for the frontend and a web service for the backend (Docker)
services:
  - type: web_service
    name: unhimas-backend
    env: docker
    root: "backend"
    plan: free
    envVars:
      - key: MONGO_URI
        value: "${MONGO_URI}"
      - key: NODE_ENV
        value: "production"
    healthCheckPath: "/api/health"
    region: oregon
    autoDeploy: true

  - type: static_site
    name: unhimas-frontend
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web_service
          name: unhimas-backend
          property: url


# Render will build the Dockerfile located at `backend/Dockerfile` for the backend service.
