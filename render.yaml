# Render manifest for unhimas_saas
# Backend: Docker Web Service
# Frontend: Static Site (in root directory)

services:
  - type: web
    name: unhimas-backend
    env: docker
    root: backend        # Dockerfile should be inside 'backend'
    plan: free
    envVars:
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    region: oregon
    autoDeploy: true

staticSites:
  - name: unhimas-frontend
    root: ./             # Frontend is in the root of the repo
    buildCommand: npm install && npm run build  # Adjust if you use yarn
    publishPath: build                       # React default output
    env:
      - key: NODE_ENV
        value: production
    region: oregon
    plan: free
    autoDeploy: true
