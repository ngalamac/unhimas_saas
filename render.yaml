# Render manifest for unhimas_saas
# Fullstack MERN app (backend + frontend served by backend)
services:
  - type: web
    name: unhimas-app
    env: docker
    root: ./               
    plan: free
    envVars:
      - key: MONGO_URI
        fromSecret: MONGO_URI   # Add secret in Render dashboard
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    region: oregon
    autoDeploy: true
