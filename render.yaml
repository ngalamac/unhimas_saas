# Render manifest for unhimas_saas
# Backend serves both API and frontend (MERN fullstack)
services:
  - type: web
    name: unhimas-app
    env: docker
    root: backend       # Dockerfile builds backend + serves frontend from root/build
    plan: free
    envVars:
      - key: MONGO_URI
        fromSecret: MONGO_URI
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    region: oregon
    autoDeploy: true
