# Render manifest for unhimas_saas
# Defines a static site for the frontend and a web service for the backend (Docker)
services:
  - type: static_site
    name: unhimas-frontend
    env: static
    repo: "https://github.com/ngalamac/unhimas_saas.git"
    branch: ohada
    buildCommand: "npm install && npm run build"
    publishPath: "dist"
    root: "."

  - type: web_service
    name: unhimas-backend
    env: docker
    repo: "https://github.com/ngalamac/unhimas_saas.git"
    branch: ohada
    root: "backend"
    plan: free
    envVars:
      - key: MONGO_URI
        value: "${MONGO_URI}"
      - key: NODE_ENV
        value: "production"
    healthCheckPath: "/api/health"
    region: oregon
    autoDeploy: true

# Render will build the Dockerfile located at `backend/Dockerfile` for the backend service.
